global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/recording_rules.yml

scrape_configs:
  - job_name: "dockpulse"
    scrape_interval: 5s
    static_configs:
      - targets: ["${DOCKPULSE_EXPORTER_TARGET:-host.docker.internal:9090}"]
        labels:
          instance: "dockpulse"
